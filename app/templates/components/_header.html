<header class="sticky top-0 z-10 flex items-center justify-between px-4 md:px-6 h-14 bg-slate-900/80 backdrop-blur-sm border-b border-slate-700/50">

  <!-- Mobile menu button -->
  <button onclick="openSidebar()" class="lg:hidden flex items-center justify-center w-9 h-9 rounded-lg text-slate-400 hover:text-white hover:bg-slate-700/50 transition-colors">
    <i class="bi bi-list text-xl"></i>
  </button>

  <!-- Breadcrumb / Title -->
  <div class="hidden lg:flex items-center gap-2 text-sm text-slate-400">
    <i class="bi bi-house text-xs"></i>
    <span>/</span>
    <a href="{% url 'home' %}" class="hover:text-white transition-colors">SGE</a>
  </div>

  <!-- Right side -->
  <div class="flex items-center gap-3 ml-auto">
    {% if user.is_authenticated %}
    <div class="flex items-center gap-2 text-sm text-slate-400">
      <div class="w-7 h-7 rounded-full bg-gradient-to-br from-indigo-500 to-violet-500 flex items-center justify-center text-xs font-bold text-white">
        {{ user.username|first|upper }}
      </div>
      <span class="hidden sm:block text-slate-300">{{ user.username }}</span>
    </div>
    {% endif %}
  </div>

</header>
