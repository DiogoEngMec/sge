<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SGE{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'dark-bg': '#0f172a',
            'dark-card': '#1e293b',
            'dark-input': '#334155',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    /* Django form.as_p */
    .sge-form p { margin-bottom: 1rem; }
    .sge-form label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: rgb(203 213 225);
      margin-bottom: 0.375rem;
    }
    .sge-form input[type="text"],
    .sge-form input[type="number"],
    .sge-form input[type="email"],
    .sge-form input[type="url"],
    .sge-form input[type="date"],
    .sge-form input[type="datetime-local"],
    .sge-form select,
    .sge-form textarea {
      width: 100%;
      padding: 0.625rem 0.875rem;
      background-color: rgba(51, 65, 85, 0.5);
      border: 1px solid rgb(71 85 105);
      border-radius: 0.5rem;
      color: white;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-size: 0.875rem;
    }
    .sge-form input:focus,
    .sge-form select:focus,
    .sge-form textarea:focus {
      border-color: rgb(99 102 241);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25);
    }
    .sge-form select option { background-color: rgb(30 41 59); color: white; }
    .sge-form .errorlist { margin-top: 0.25rem; }
    .sge-form .errorlist li {
      font-size: 0.75rem;
      color: rgb(248 113 113);
      list-style: none;
    }
    .sge-form input[type="checkbox"] {
      width: 1rem; height: 1rem;
      accent-color: rgb(99 102 241);
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgb(15 23 42); }
    ::-webkit-scrollbar-thumb { background: rgb(51 65 85); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgb(71 85 105); }
  </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

  <!-- Mobile overlay -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden" onclick="closeSidebar()"></div>

  <div class="flex min-h-screen">

    {% if user.is_authenticated %}
      {% include 'components/_sidebar.html' %}
    {% endif %}

    <!-- Main area -->
    <div class="flex-1 flex flex-col min-w-0">
      {% include 'components/_header.html' %}

      <main class="flex-1 p-4 md:p-6">
        {% block content %}{% endblock %}
      </main>

      {% include 'components/_footer.html' %}
    </div>

  </div>

  <script>
    function openSidebar() {
      document.getElementById('sidebar').classList.remove('-translate-x-full');
      document.getElementById('sidebar-overlay').classList.remove('hidden');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.add('-translate-x-full');
      document.getElementById('sidebar-overlay').classList.add('hidden');
    }
    // Highlight active sidebar link
    document.addEventListener('DOMContentLoaded', function() {
      const links = document.querySelectorAll('.sidebar-nav-link');
      const current = window.location.pathname;
      links.forEach(link => {
        const href = link.getAttribute('href');
        if (href && current.startsWith(href) && href !== '/') {
          link.classList.add('bg-indigo-600/20', 'text-indigo-400', 'border-l-2', 'border-indigo-500');
          link.classList.remove('text-slate-300', 'hover:text-white');
        } else if (href === '/' && current === '/') {
          link.classList.add('bg-indigo-600/20', 'text-indigo-400', 'border-l-2', 'border-indigo-500');
          link.classList.remove('text-slate-300', 'hover:text-white');
        }
      });
    });
  </script>

</body>
</html>
