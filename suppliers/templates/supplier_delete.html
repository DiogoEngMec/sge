{% extends 'base.html' %}
{% block title %}SGE - Excluir Fornecedor{% endblock %}

{% block content %}

  <div class="mb-6 flex items-center gap-3">
    <a href="{% url 'supplier_list' %}" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-white hover:bg-slate-700/50 transition-colors">
      <i class="bi bi-arrow-left text-sm"></i>
    </a>
    <div>
      <h1 class="text-xl font-bold text-white">Excluir Fornecedor</h1>
    </div>
  </div>

  <div class="max-w-md">
    <div class="bg-slate-800/50 backdrop-blur-sm rounded-xl border border-red-500/20 p-6">
      <div class="flex items-center gap-4 mb-5">
        <div class="w-12 h-12 rounded-xl bg-red-500/20 flex items-center justify-center flex-shrink-0">
          <i class="bi bi-exclamation-triangle text-xl text-red-400"></i>
        </div>
        <div>
          <h2 class="text-base font-semibold text-white">Confirmar exclusão</h2>
          <p class="text-sm text-slate-400 mt-0.5">Esta ação não pode ser desfeita</p>
        </div>
      </div>
      <p class="text-sm text-slate-300 mb-6">
        Tem certeza de que deseja excluir o fornecedor <strong class="text-white">{{ object.name }}</strong>?
      </p>
      <form method="post" class="flex gap-3">
        {% csrf_token %}
        <button type="submit" class="px-5 py-2.5 rounded-lg bg-red-600 hover:bg-red-700 text-white text-sm font-semibold transition-colors shadow-lg shadow-red-500/20">
          Excluir
        </button>
        <a href="{% url 'supplier_list' %}" class="px-5 py-2.5 rounded-lg bg-slate-700/50 hover:bg-slate-700 text-slate-300 hover:text-white text-sm font-medium transition-colors border border-slate-600">
          Cancelar
        </a>
      </form>
    </div>
  </div>

{% endblock %}
