{% extends 'base.html' %}
{% block title %}SGE - Editar Marca{% endblock %}

{% block content %}

  <div class="mb-6 flex items-center gap-3">
    <a href="{% url 'brand_list' %}" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-white hover:bg-slate-700/50 transition-colors">
      <i class="bi bi-arrow-left text-sm"></i>
    </a>
    <div>
      <h1 class="text-xl font-bold text-white">Editar Marca</h1>
      <p class="text-sm text-slate-400 mt-0.5">{{ object.name }}</p>
    </div>
  </div>

  <div class="max-w-xl">
    <div class="bg-slate-800/50 backdrop-blur-sm rounded-xl border border-slate-700/50 p-6">
      <form method="post" class="sge-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="flex gap-3 mt-6 pt-4 border-t border-slate-700/50">
          <button type="submit" class="flex-1 sm:flex-none px-5 py-2.5 rounded-lg bg-gradient-to-r from-indigo-600 to-violet-600 text-white text-sm font-semibold hover:from-indigo-700 hover:to-violet-700 shadow-lg shadow-indigo-500/20 transition-all duration-200">
            Salvar Alterações
          </button>
          <a href="{% url 'brand_list' %}" class="px-5 py-2.5 rounded-lg bg-slate-700/50 hover:bg-slate-700 text-slate-300 hover:text-white text-sm font-medium transition-colors border border-slate-600">
            Cancelar
          </a>
        </div>
      </form>
    </div>
  </div>

{% endblock %}
